<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latent AI | Premium AI Assistant</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="light">
  <div class="dashboard-wrapper">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-circle">🇮🇳</div>
        <span class="logo-text">LATENT AI</span>
      </div>
      <nav class="nav-menu">
        <button id="chatTabBtn" class="nav-item active"><i class="fas fa-comment-dots"></i> New Chat</button>
        <button id="savedTabBtn" class="nav-item"><i class="fas fa-history"></i> Saved History</button>
        <button id="settingsTabBtn" class="nav-item"><i class="fas fa-cog"></i> Settings</button>
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <div id="locationDisplay" class="status-badge">📍 Ahmedabad, India</div>
        <div class="theme-switch">
          <input type="checkbox" id="darkModeToggle">
        </div>
      </header>

      <section id="chatPanel" class="content-panel active">
        <div class="welcome-hero">
          <h1>Namaste, I'm Latent.</h1>
          <p>How can I help you with your engineering tasks today?</p>
        </div>
        <div id="chatContainer" class="chat-container"></div>
      </section>

      <section id="savedPanel" class="content-panel hidden">
        <div class="panel-header"><h2>Saved Conversations</h2></div>
        <div id="savedChatsList" class="chat-container"><p style="padding:20px; color:#888;">No history yet.</p></div>
      </section>

      <section id="settingsPanel" class="content-panel hidden">
        <div class="panel-header"><h2>Settings</h2></div>
        <p style="padding:20px;">Profile & API settings coming soon.</p>
      </section>

      <div class="input-section">
        <div class="input-container">
          <input type="text" id="inputBox" placeholder="Ask Latent anything..." autocomplete="off">
          <button id="sendBtn" class="send-action">Send <i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
